<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sublimé Studio | Luxury Catalog</title>
    <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@300;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --rose: #ffb7b2; --blue: #d4e1f5; --glass: rgba(255, 255, 255, 0.5); --text: #4a4a4a; }
        * { box-sizing: border-box; }
        body {
            font-family: 'Quicksand', sans-serif; margin: 0; color: var(--text);
            background: linear-gradient(45deg, #fdfaf9, #e2f0d9, #f0f7ff, #fdfaf9);
            background-size: 400% 400%; animation: gradFlow 15s ease infinite; min-height: 100vh; padding-bottom: 100px;
        }
        @keyframes gradFlow { 0% {background-position: 0% 50%;} 50% {background-position: 100% 50%;} 100% {background-position: 0% 50%;} }
        header { background: var(--glass); backdrop-filter: blur(15px); -webkit-backdrop-filter: blur(15px); border-bottom: 1px solid rgba(255,255,255,0.3); padding: 2.5rem 1rem; text-align: center; position: sticky; top: 0; z-index: 1000; }
        .logo { font-size: 2.5rem; font-weight: 300; letter-spacing: 12px; text-transform: uppercase; margin-bottom: 1.5rem; color: #333; }
        .search-bar { width: 100%; max-width: 550px; padding: 14px 28px; border-radius: 35px; border: 1px solid rgba(255,255,255,0.5); outline: none; background: rgba(255,255,255,0.6); font-family: inherit; font-size: 1rem; }
        .filters { display: flex; gap: 12px; overflow-x: auto; justify-content: center; padding: 1.5rem 10px; scrollbar-width: none; }
        .f-btn { background: rgba(255,255,255,0.4); border: 1px solid white; padding: 10px 24px; border-radius: 25px; cursor: pointer; transition: 0.3s; font-weight: 500; white-space: nowrap; }
        .f-btn.active { background: var(--rose); color: white; border-color: var(--rose); box-shadow: 0 5px 15px rgba(255,183,178,0.3); }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(290px, 1fr)); gap: 35px; padding: 2rem; max-width: 1400px; margin: 0 auto; }
        .card { background: var(--glass); backdrop-filter: blur(10px); border-radius: 35px; overflow: hidden; border: 1px solid rgba(255,255,255,0.4); transition: 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275); cursor: pointer; position: relative; }
        .card:hover { transform: translateY(-12px) scale(1.02); box-shadow: 0 20px 40px rgba(0,0,0,0.05); }
        .card img { width: 100%; height: 380px; object-fit: cover; }
        .price { color: var(--rose); font-weight: bold; font-size: 1.4rem; margin: 10px 0; }
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(255,255,255,0.9); backdrop-filter: blur(25px); z-index: 2000; padding: 50px 20px; overflow-y: auto; }
        .modal-content { max-width: 1100px; margin: auto; display: grid; grid-template-columns: 1fr 1.2fr; gap: 50px; }
        @media (max-width: 850px) { .modal-content { grid-template-columns: 1fr; } }
        .gallery img { width: 100%; border-radius: 30px; margin-bottom: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.05); }
        .btn-order { width: 100%; background: var(--blue); color: #5a7fb2; border: none; padding: 20px; border-radius: 20px; font-weight: bold; font-size: 1.1rem; cursor: pointer; }
        .cart-float { position: fixed; bottom: 35px; right: 35px; background: #25d366; color: white; padding: 18px 38px; border-radius: 60px; font-weight: 700; display: flex; align-items: center; gap: 14px; cursor: pointer; box-shadow: 0 12px 40px rgba(37,211,102,0.4); }
    </style>
</head>
<body>

<header>
    <div class="logo">Sublimé Studio</div>
    <input type="text" id="q" class="search-bar" placeholder="¿Qué buscas hoy?" onkeyup="render()">
    <div class="filters" id="f"></div>
</header>

<div class="grid" id="g"></div>

<div id="m" class="modal">
    <div style="text-align:right; max-width:1100px; margin:auto;"><span onclick="closeM()" style="font-size:3.5rem; cursor:pointer;">&times;</span></div>
    <div class="modal-content" id="mc"></div>
</div>

<div class="cart-float" onclick="checkout()">
    <i class="fab fa-whatsapp" style="font-size:1.6rem;"></i>
    <span>Mi Pedido (<span id="cc">0</span>)</span>
</div>

<script>
    const GITHUB_USER = "xCarlitos09"; 
    const REPO_NAME = "websublime"; 
    let allProducts = [], cart = [], curCat = 'Todas', activeP = null;

    async function init() {
        try {
            // Usamos merch.json tal cual aparece en tu GitHub
            const response = await fetch(`https://${GITHUB_USER}.github.io/${REPO_NAME}/merch.json`);
            allProducts = await response.json();
            renderF();
            render();
        } catch (e) {
            document.getElementById('g').innerHTML = "<h2>⚠️ Sube tu archivo merch.json a GitHub para ver el catálogo.</h2>";
        }
    }

    function renderF() {
        const cats = ['Todas', ...new Set(allProducts.map(p => p.category))];
        document.getElementById('f').innerHTML = cats.map(c => 
            `<button class="f-btn ${curCat===c?'active':''}" onclick="setCat('${c}')">${c}</button>`
        ).join('');
    }

    function render() {
        const query = document.getElementById('q').value.toLowerCase();
        const grid = document.getElementById('g');
        grid.innerHTML = allProducts.filter(p => 
            (curCat === 'Todas' || p.category === curCat) && p.name.toLowerCase().includes(query)
        ).map(p => `
            <div class="card" onclick="openM(${p.id})">
                <img src="${p.images[0]}" onerror="this.src='https://via.placeholder.com/400x500?text=Sublimé+Studio'">
                <div style="padding:25px; text-align:center;">
                    <small style="text-transform:uppercase; color:#aaa;">${p.category}</small>
                    <h3>${p.name}</h3>
                    <p class="price">$${p.price}</p>
                </div>
            </div>`).join('');
    }

    function setCat(c) { curCat = c; renderF(); render(); }

    function openM(id) {
        activeP = allProducts.find(p => p.id === id);
        document.getElementById('mc').innerHTML = `
            <div class="gallery">${activeP.images.map(i => `<img src="${i}">`).join('')}</div>
            <div class="details">
                <h1>${activeP.name}</h1>
                <p class="price" style="font-size:2.5rem;">$${activeP.price}</p>
                <p style="line-height:1.7; color:#666; margin-bottom:30px;">${activeP.desc}</p>
                <label><b>Selecciona Talla:</b></label>
                <select id="sz" style="width:100%; padding:14px; border-radius:15px; border:1px solid #eee; margin-bottom:20px;">
                    ${activeP.sizes.map(s => `<option>${s}</option>`).join('')}
                </select>
                <label><b>Color / Diseño:</b></label>
                <select id="cl" style="width:100%; padding:14px; border-radius:15px; border:1px solid #eee; margin-bottom:20px;">
                    ${activeP.colors.map(c => `<option>${c}</option>`).join('')}
                </select>
                <button onclick="addC()" class="btn-order">Añadir al Pedido</button>
            </div>`;
        document.getElementById('m').style.display = 'block';
        document.body.style.overflow = 'hidden';
    }

    function closeM() { document.getElementById('m').style.display = 'none'; document.body.style.overflow = 'auto'; }

    function addC() { 
        cart.push({ name: activeP.name, price: activeP.price, size: document.getElementById('sz').value, color: document.getElementById('cl').value }); 
        document.getElementById('cc').innerText = cart.length; 
        closeM(); 
    }

    function checkout() {
        if(!cart.length) return alert("El carrito está vacío.");
        const n = prompt("¿A nombre de quién hacemos el pedido?"); 
        const d = prompt("¿Dirección de envío o Ciudad?");
        if(!n || !d) return;
        let m = `¡Hola Sublimé Studio! 👋\n*Cliente:* ${n}\n*Envío:* ${d}\n\n*Pedido:*\n`;
        cart.forEach(i => m += `• ${i.name} ($${i.price}) - Talla: ${i.size}, Color: ${i.color}\n`);
        const total = cart.reduce((s, i) => s + parseFloat(i.price), 0);
        m += `\n*TOTAL: $${total.toFixed(2)}*`;
        window.open(`https://wa.me/584120000000?text=${encodeURIComponent(m)}`);
    }

    window.onload = init;
</script>
</body>
</html>
